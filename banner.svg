<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="55%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#131B2E"/>
    </linearGradient>

    <linearGradient id="monoStroke" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>

    <filter id="glow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#8B949E" opacity="0.35"/>
    </pattern>

    <mask id="dotsFade">
      <rect width="1200" height="280" fill="url(#dotsFadeGrad)"/>
    </mask>
    <linearGradient id="dotsFadeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- base -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- faint dot grid, fades in from the left -->
  <rect width="1200" height="280" fill="url(#dots)" mask="url(#dotsFade)" opacity="0.5"/>

  <!-- giant faint monogram bleeding off the left edge -->
  <text x="-70" y="255" font-family="Arial, Helvetica, sans-serif" font-weight="900"
        font-size="430" fill="none" stroke="url(#monoStroke)" stroke-width="2"
        opacity="0.10">N</text>

  <!-- thin vertical accent rule -->
  <line x1="120" y1="70" x2="120" y2="210" stroke="url(#monoStroke)" stroke-width="2" opacity="0.55"/>

  <!-- constellation / network mesh, right two-thirds -->
  <g stroke="#8FA3C0" stroke-width="1" opacity="0.35">
    <line x1="700" y1="90"  x2="760" y2="150"/>
    <line x1="760" y1="150" x2="820" y2="70"/>
    <line x1="820" y1="70"  x2="880" y2="130"/>
    <line x1="880" y1="130" x2="940" y2="190"/>
    <line x1="940" y1="190" x2="1000" y2="100"/>
    <line x1="1000" y1="100" x2="1050" y2="160"/>
    <line x1="1050" y1="160" x2="1100" y2="80"/>
    <line x1="700" y1="90"  x2="770" y2="110"/>
    <line x1="770" y1="110" x2="820" y2="70"/>
    <line x1="760" y1="150" x2="730" y2="200"/>
    <line x1="730" y1="200" x2="860" y2="220"/>
    <line x1="860" y1="220" x2="940" y2="190"/>
    <line x1="940" y1="190" x2="1020" y2="210"/>
    <line x1="1020" y1="210" x2="1090" y2="140"/>
    <line x1="1090" y1="140" x2="1100" y2="80"/>
    <line x1="1000" y1="100" x2="960" y2="60"/>
    <line x1="960" y1="60"  x2="1050" y2="160"/>
  </g>

  <!-- animated "data pulse" travelling along two edges -->
  <line x1="880" y1="130" x2="940" y2="190" stroke="url(#lineGrad)" stroke-width="2">
    <animate attributeName="x1" values="880;940;880" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="130;190;130" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="940;880;940" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="190;130;190" dur="3.2s" repeatCount="indefinite"/>
  </line>
  <line x1="860" y1="220" x2="940" y2="190" stroke="url(#lineGrad)" stroke-width="2">
    <animate attributeName="x1" values="860;940;860" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="y1" values="220;190;220" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="940;860;940" dur="3.6s" repeatCount="indefinite"/>
    <animate attributeName="y2" values="190;220;190" dur="3.6s" repeatCount="indefinite"/>
  </line>

  <!-- nodes -->
  <g>
    <circle cx="700" cy="90" r="3.2" fill="#8B5CF6"/>
    <circle cx="760" cy="150" r="3" fill="#38BDF8"/>
    <circle cx="820" cy="70" r="3" fill="#8B5CF6"/>
    <circle cx="880" cy="130" r="4.5" fill="#22D3EE" filter="url(#glow)">
      <animate attributeName="r" values="4;6;4" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="940" cy="190" r="5" fill="#8B5CF6" filter="url(#glow)">
      <animate attributeName="r" values="4.5;6.5;4.5" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="100" r="3" fill="#38BDF8"/>
    <circle cx="1050" cy="160" r="3" fill="#22D3EE"/>
    <circle cx="1100" cy="80" r="3.2" fill="#8B5CF6"/>
    <circle cx="730" cy="200" r="2.6" fill="#38BDF8"/>
    <circle cx="860" cy="220" r="4" fill="#22D3EE" filter="url(#glow)">
      <animate attributeName="r" values="3.5;5.2;3.5" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="960" cy="60" r="2.6" fill="#8B5CF6"/>
    <circle cx="1020" cy="210" r="3" fill="#38BDF8"/>
    <circle cx="1090" cy="140" r="3" fill="#22D3EE"/>
    <circle cx="770" cy="110" r="2.6" fill="#38BDF8"/>
  </g>

  <!-- soft ambient glow blobs -->
  <circle cx="960" cy="140" r="150" fill="#22D3EE" opacity="0.05"/>
  <circle cx="800" cy="160" r="120" fill="#8B5CF6" opacity="0.05"/>

  <!-- vignette for cohesion -->
  <rect width="1200" height="280" fill="url(#vignette)"/>

  <!-- bottom hairline, echoes the divider style used elsewhere in the README -->
  <line x1="0" y1="279" x2="1200" y2="279" stroke="url(#monoStroke)" stroke-width="1" opacity="0.3"/>
</svg>
